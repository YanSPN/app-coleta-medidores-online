<!DOCTYPE html>

    .loja-nome { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chip-danif { background: #fff8e1; color: #b45309; }
    .chip-pend  { background: #fef2f2; color: #dc2626; }
    .coleta-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; }

    .luc-energia { background: #e8f0fe; color: #1a73e8; }
    .luc-agua    { background: #e3f2fd; color: #0277bd; }
    .luc-gas     { background: #fff3e0; color: #e65100; }
    .foto-area { border: 2px dashed #d0d0d0; border-radius: 16px; overflow: hidden; background: #fafafa; margin-bottom: 16px; cursor: pointer; min-height: 170px; display: flex; align-items: center; justify-content: center; position: relative; }
    .foto-area.com-foto { border-style: solid; border-color: #2e7d32; background: #f1f8f1; }
    .foto-placeholder { text-align: center; padding: 24px 16px; }
    .foto-icon { font-size: 38px; margin-bottom: 8px; }
    .foto-placeholder p { font-size: 14px; color: #555; font-weight: 500; margin-bottom: 4px; }
    .foto-placeholder small { font-size: 12px; color: #999; }
    .foto-preview { width: 100%; max-height: 220px; object-fit: cover; display: block; }

    .leitura-card label { font-size: 12px; color: #666; font-weight: 500; display: block; margin-bottom: 6px; }
    .leitura-row { display: flex; align-items: center; gap: 8px; }
    .leitura-input { flex: 1; padding: 11px 14px; border: 1.5px solid #d0d7f0; border-radius: 10px; font-size: 20px; font-weight: 600; background: #fff; color: #1a1a1a; text-align: center; outline: none; }

    .cbox-agua    .clabel { color: #0277bd; }
    .cbox-gas     .clabel { color: #e65100; }

    .cbox-gas     .cvalor { color: #bf360c; }

<body>
<div class="app">
  <!-- LISTA -->
  <div id="screen-lista" class="screen active">
    <div class="top-bar">
      <h1>Coleta de Medidores</h1>
      <span id="mes-label" style="font-size:12px;color:#888;background:#f0f0f0;padding:4px 10px;border-radius:20px;"></span>
    </div>
    <div style="padding:0 16px;">
      <div class="insumo-tabs">
        <button class="insumo-tab active-energia" id="itab-energia" onclick="mudarInsumo('energia')">⚡ Energia</button>
        <button class="insumo-tab" id="itab-agua" onclick="mudarInsumo('agua')">💧 Água</button>
        <button class="insumo-tab" id="itab-gas" onclick="mudarInsumo('gas')">🔥 Gás</button>
      </div>
      <div class="progress-meta">
        <span id="progress-texto">Carregando...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill fill-energia" style="width:0%"></div></div>
      <div class="sync-bar">
        <div style="display:flex;align-items:center;">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-info">Conectando...</span>
        </div>
        <button class="refresh-btn" onclick="carregarLeituras()">Atualizar</button>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="filtrar('todas')">Todas</button>
        <button class="tab" onclick="filtrar('pendentes')">Pendentes</button>
        <button class="tab" onclick="filtrar('concluidas')">Concluídas</button>
      </div>
      <input class="search-box" placeholder="Buscar por nome ou código..." oninput="buscar(this.value)" />
      <div id="lista-lojas"><div class="empty">Carregando...</div></div>
    </div>
  </div>

  <!-- COLETA -->
  <div id="screen-coleta" class="screen" style="padding:0 0 90px;">
    <div class="coleta-header">
      <button class="back-btn" onclick="voltarLista()">&#8592;</button>
      <h2 id="coleta-nome"></h2>
      <span class="luc-badge luc-energia" id="coleta-badge"></span>
    </div>
    <div style="padding:0 16px;">
      <div id="foto-area" class="foto-area" onclick="abrirCamera()">
        <div id="foto-placeholder" class="foto-placeholder">
          <div class="foto-icon">📷</div>
          <p>Fotografar medidor</p>
          <small>A IA tentará ler o número automaticamente</small>
        </div>
        <img id="foto-preview" class="foto-preview" src="" style="display:none;" />
        <button id="foto-change-btn" class="foto-change-btn" style="display:none;" onclick="event.stopPropagation();abrirCamera()">Trocar foto</button>
      </div>
      <input type="file" id="file-input" accept="image/*" capture="environment" onchange="processarFoto(this)" />
      <div class="ia-status" id="ia-status">
        <div class="spinner"></div>
        <span id="ia-msg">Analisando imagem...</span>
      </div>
      <div class="coletor-wrap">
        <label>Coletado por</label>
        <input class="coletor-input" id="coletor-input" placeholder="Seu nome" />
      </div>
      <div id="leitura-card" class="leitura-card card-energia">
        <label>Leitura atual</label>
        <div class="leitura-row">
          <input class="leitura-input" type="number" id="leitura-input" placeholder="0" oninput="calcularConsumo()" />
          <span class="unit" id="unit-label">kWh</span>
        </div>
        <div class="anterior-info" id="leitura-anterior"></div>
        <div id="consumo-box" class="consumo-box cbox-energia">
          <div class="clabel">Consumo do mês</div>
          <div class="cvalor" id="consumo-val"></div>
        </div>
      </div>
      <div class="alerta" id="alerta-consumo">⚠️ Consumo fora do padrão — verifique antes de salvar.</div>
      <button class="btn btn-e" id="btn-salvar" onclick="salvarLeitura()">Confirmar e salvar</button>
      <button class="btn btn-warn" onclick="marcarDanificado()">Medidor danificado / ilegível</button>
      <button class="btn btn-ghost" onclick="voltarLista()">Cancelar</button>
    </div>
  </div>

  <!-- RESUMO -->
  <div id="screen-resumo" class="screen">
    <div class="top-bar">
      <button class="back-btn" onclick="showScreen('screen-lista')">&#8592;</button>
      <h1>Resumo da coleta</h1>
    </div>
    <div style="padding:0 16px;">
      <p style="font-size:13px;color:#888;margin-bottom:14px;">Mês: <strong id="resumo-mes"></strong></p>
      <div class="resumo-itabs">
        <button class="resumo-itab active" onclick="mudarResumoInsumo('energia')">⚡ Energia</button>
        <button class="resumo-itab" onclick="mudarResumoInsumo('agua')">💧 Água</button>
        <button class="resumo-itab" onclick="mudarResumoInsumo('gas')">🔥 Gás</button>
      </div>
      <div class="stat-grid">
        <div class="stat-card stat-total"><div class="num" id="r-total">—</div><div class="lbl">lojas</div></div>
        <div class="stat-card stat-ok"><div class="num" id="r-ok">—</div><div class="lbl">coletadas</div></div>
        <div class="stat-card stat-danif"><div class="num" id="r-danif">—</div><div class="lbl">danificados</div></div>
      </div>
      <div id="resumo-lista"></div>
      <button class="btn btn-e" onclick="exportarCSV()">Exportar para Excel (.CSV)</button>
    </div>
  </div>
</div>
<button class="fab" onclick="showScreen('screen-resumo')">&#9776;</button>
<div class="toast" id="toast"></div>

let insumoAtual='energia', resumoInsumo='energia';
let leituras={energia:{},agua:{},gas:{}};
let lojaAtual=null, filtroAtual='todas', buscaAtual='', fotoBlob=null, salvando=false;

function formatarMes(ym){const[y,m]=ym.split('-');return['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m,10)-1]+'/'+y;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='screen-resumo')renderResumo();}
function toast(msg,dur=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function setSyncStatus(e,msg){const d=document.getElementById('sync-dot');d.className='sync-dot'+(e==='saving'?' saving':e==='error'?' error':'');document.getElementById('sync-info').textContent=msg;}

function mudarInsumo(ins){
  insumoAtual=ins;
  ['energia','agua','gas'].forEach(i=>{const t=document.getElementById('itab-'+i);t.className='insumo-tab'+(i===ins?' active-'+i:'');});
  const pf=document.getElementById('progress-fill');pf.className='progress-fill fill-'+ins;
  filtroAtual='todas';buscaAtual='';
  document.querySelector('.search-box').value='';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  renderLista();
}

async function carregarLeituras(){
  setSyncStatus('saving','Carregando...');
  try{
    const{data,error}=await db.from('leituras').select('*').eq('mes',MES_ATUAL);
    if(error)throw error;
    leituras={energia:{},agua:{},gas:{}};
    (data||[]).forEach(r=>{const ins=r.insumo||'energia';if(leituras[ins])leituras[ins][r.luc]=r;});
    setSyncStatus('ok','Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){setSyncStatus('error','Erro ao conectar');toast('Erro ao carregar.');}
  renderLista();
}

function renderLista(){
  document.getElementById('mes-label').textContent=formatarMes(MES_ATUAL);
  document.getElementById('resumo-mes').textContent=formatarMes(MES_ATUAL);
  const lojas=LOJAS[insumoAtual],leits=leituras[insumoAtual];
  const concl=Object.keys(leits).length,pct=Math.round(concl/lojas.length*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-texto').textContent=concl+' de '+lojas.length+' medidores';
  document.getElementById('progress-pct').textContent=pct+'%';
  const busca=buscaAtual.toLowerCase();
  const filtradas=lojas.filter(l=>{
    const mb=l.nome.toLowerCase().includes(busca)||l.luc.toLowerCase().includes(busca);
    const d=leits[l.luc],st=d?(d.status==='danificado'?'danificado':'concluida'):'pendente';
    const mf=filtroAtual==='todas'||(filtroAtual==='pendentes'&&st==='pendente')||(filtroAtual==='concluidas'&&st!=='pendente');
    return mb&&mf;
  });
  const lista=document.getElementById('lista-lojas');
  if(!filtradas.length){lista.innerHTML='<div class="empty">Nenhuma loja encontrada</div>';return;}
  lista.innerHTML=filtradas.map(l=>{
    const d=leits[l.luc],danif=d?.status==='danificado',ok=d&&!danif;
    const cls=danif?'danificada':ok?'concluida':'pendente';
    const hora=d?.updated_at?new Date(d.updated_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'';
    const sub=danif?'Danificado'+(hora?' · '+hora:''):ok?(d.consumo||0).toLocaleString('pt-BR')+' '+UNIDADES[insumoAtual]+(d.coletado_por?' · '+d.coletado_por:'')+(hora?' · '+hora:''):'Pendente';
    const chip=danif?'<span class="status-chip chip-danif">Danif.</span>':ok?'<span class="status-chip chip-ok">OK</span>':'<span class="status-chip chip-pend">Pend.</span>';
    const lucEsc=l.luc.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return`<div class="loja-item ${cls}" onclick="abrirColeta('${lucEsc}','${insumoAtual}')"><div class="loja-info"><div class="loja-nome">${l.nome}</div><div class="loja-sub">${l.luc} · ${sub}</div></div>${chip}</div>`;
  }).join('');
}

function filtrar(f){filtroAtual=f;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['todas','pendentes','concluidas'][i]===f));renderLista();}
function buscar(v){buscaAtual=v;renderLista();}

function abrirColeta(luc,ins){
  const l=LOJAS[ins].find(x=>x.luc===luc);if(!l)return;
  lojaAtual={...l,insumo:ins};fotoBlob=null;
  document.getElementById('coleta-nome').textContent=l.nome;
  const badge=document.getElementById('coleta-badge');badge.textContent=l.luc;badge.className='luc-badge luc-'+ins;
  document.getElementById('leitura-card').className='leitura-card card-'+ins;
  document.getElementById('consumo-box').className='consumo-box cbox-'+ins;
  document.getElementById('unit-label').textContent=UNIDADES[ins];
  const bs=document.getElementById('btn-salvar');bs.className='btn btn-'+(ins==='energia'?'e':ins==='agua'?'a':'g');bs.textContent='Confirmar e salvar';
  document.getElementById('leitura-anterior').textContent='Leitura anterior: '+l.anterior.toLocaleString('pt-BR')+' '+UNIDADES[ins];
  document.getElementById('consumo-box').classList.remove('show');
  document.getElementById('alerta-consumo').classList.remove('show');
  document.getElementById('ia-status').classList.remove('show');
  document.getElementById('foto-placeholder').style.display='flex';
  document.getElementById('foto-preview').style.display='none';
  document.getElementById('foto-change-btn').style.display='none';
  document.getElementById('foto-area').classList.remove('com-foto');
  const salvo=leituras[ins][luc];
  document.getElementById('leitura-input').value=salvo?.leitura_atual||'';
  document.getElementById('coletor-input').value=salvo?.coletado_por||'';
  if(salvo?.foto_url){document.getElementById('foto-preview').src=salvo.foto_url;document.getElementById('foto-preview').style.display='block';document.getElementById('foto-placeholder').style.display='none';document.getElementById('foto-change-btn').style.display='block';document.getElementById('foto-area').classList.add('com-foto');}
  calcularConsumo();showScreen('screen-coleta');
}

function abrirCamera(){document.getElementById('file-input').click();}

async function processarFoto(input){
  const file=input.files[0];if(!file)return;
  fotoBlob=file;
  document.getElementById('foto-preview').src=URL.createObjectURL(file);
  document.getElementById('foto-preview').style.display='block';
  document.getElementById('foto-placeholder').style.display='none';
  document.getElementById('foto-change-btn').style.display='block';
  document.getElementById('foto-area').classList.add('com-foto');
  const ia=document.getElementById('ia-status'),msg=document.getElementById('ia-msg');
  ia.classList.add('show');msg.textContent='Analisando imagem com IA...';
  try{
    const b64=await new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(',')[1]);rd.onerror=j;rd.readAsDataURL(file);});
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'content-type':'application/json','x-api-key':ANTHROPIC_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:64,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Qual é a leitura numérica neste medidor? Responda APENAS com o número (decimais com ponto). Se não identificar, responda 0.'}]}]})});
    const json=await resp.json();
    const lido=parseFloat((json.content?.[0]?.text||'0').replace(/[^\d.]/g,''));
    if(lido>0){document.getElementById('leitura-input').value=lido;msg.textContent='Leitura identificada: '+lido.toLocaleString('pt-BR');calcularConsumo();}
    else msg.textContent='Não foi possível ler — insira manualmente.';
  }catch(e){msg.textContent='IA indisponível — insira manualmente.';}
  setTimeout(()=>ia.classList.remove('show'),2500);
}

function calcularConsumo(){
  if(!lojaAtual)return;
  const val=parseFloat(document.getElementById('leitura-input').value);
  const box=document.getElementById('consumo-box');
  if(isNaN(val)||val===0){box.classList.remove('show');return;}
  document.getElementById('consumo-val').textContent=(val-lojaAtual.anterior).toLocaleString('pt-BR')+' '+UNIDADES[lojaAtual.insumo];
  box.classList.add('show');
  document.getElementById('alerta-consumo').classList.toggle('show',val<lojaAtual.anterior||val-lojaAtual.anterior>lojaAtual.anterior*0.08);
}

async function salvarLeitura(){
  if(salvando)return;
  const val=parseFloat(document.getElementById('leitura-input').value);
  if(isNaN(val)||val<=0){toast('Digite a leitura ou tire uma foto.');return;}
  salvando=true;document.getElementById('btn-salvar').textContent='Salvando...';setSyncStatus('saving','Salvando...');
  let foto_url=leituras[lojaAtual.insumo][lojaAtual.luc]?.foto_url||null;
  if(fotoBlob){
    const ext=fotoBlob.name.split('.').pop()||'jpg';
    const path=MES_ATUAL+'/'+lojaAtual.insumo+'/'+lojaAtual.luc.replace(/\//g,'-')+'_'+Date.now()+'.'+ext;
    const{error:upErr}=await db.storage.from('fotos-medidores').upload(path,fotoBlob,{upsert:true});
    if(!upErr){const{data:pub}=db.storage.from('fotos-medidores').getPublicUrl(path);foto_url=pub.publicUrl;}
  }
  const coletor=document.getElementById('coletor-input').value.trim()||'Equipe';
  const payload={luc:lojaAtual.luc,nome:lojaAtual.nome,mes:MES_ATUAL,insumo:lojaAtual.insumo,leitura_anterior:lojaAtual.anterior,leitura_atual:val,consumo:val-lojaAtual.anterior,status:'ok',foto_url,coletado_por:coletor};
  const{error}=await db.from('leituras').upsert(payload,{onConflict:'luc,mes,insumo'});
  salvando=false;document.getElementById('btn-salvar').textContent='Confirmar e salvar';
  if(error){setSyncStatus('error','Erro');toast('Erro ao salvar.');return;}
  leituras[lojaAtual.insumo][lojaAtual.luc]={...payload,updated_at:new Date().toISOString()};
  setSyncStatus('ok','Salvo agora');toast('Leitura salva!');voltarLista();
}

async function marcarDanificado(){
  if(salvando)return;salvando=true;setSyncStatus('saving','Salvando...');
  const coletor=document.getElementById('coletor-input').value.trim()||'Equipe';
  const payload={luc:lojaAtual.luc,nome:lojaAtual.nome,mes:MES_ATUAL,insumo:lojaAtual.insumo,leitura_anterior:lojaAtual.anterior,leitura_atual:null,consumo:null,status:'danificado',foto_url:null,coletado_por:coletor};
  const{error}=await db.from('leituras').upsert(payload,{onConflict:'luc,mes,insumo'});
  salvando=false;
  if(error){setSyncStatus('error','Erro');toast('Erro ao salvar.');return;}
  leituras[lojaAtual.insumo][lojaAtual.luc]={...payload,updated_at:new Date().toISOString()};
  setSyncStatus('ok','Salvo');toast('Marcado como danificado.');voltarLista();
}

function voltarLista(){renderLista();showScreen('screen-lista');}

function mudarResumoInsumo(ins){
  resumoInsumo=ins;
  document.querySelectorAll('.resumo-itab').forEach((t,i)=>t.classList.toggle('active',['energia','agua','gas'][i]===ins));
  renderResumoInsumo();
}

function renderResumo(){renderResumoInsumo();}

function renderResumoInsumo(){
  const lojas=LOJAS[resumoInsumo],leits=leituras[resumoInsumo];
  const ok=Object.values(leits).filter(l=>l.status==='ok').length;
  const danif=Object.values(leits).filter(l=>l.status==='danificado').length;
  document.getElementById('r-total').textContent=lojas.length;
  document.getElementById('r-ok').textContent=ok;
  document.getElementById('r-danif').textContent=danif;
  const itens=Object.entries(leits);
  const lista=document.getElementById('resumo-lista');
  if(!itens.length){lista.innerHTML='<div class="empty">Nenhuma leitura coletada ainda.</div>';return;}
  lista.innerHTML='<div class="resumo-list">'+itens.map(([luc,d])=>`<div class="resumo-row"><span class="resumo-nome">${d.nome}</span><span class="resumo-val">${d.leitura_atual?Number(d.leitura_atual).toLocaleString('pt-BR'):'—'}</span><span class="resumo-consumo">${d.status==='danificado'?'⚠ danif.':(d.consumo||0).toLocaleString('pt-BR')+' '+UNIDADES[resumoInsumo]}</span></div>`).join('')+'</div>';
}

function exportarCSV(){
  const ins=resumoInsumo;
  const linhas=[['Insumo','LUC','Loja','Leitura Anterior','Leitura Atual','Consumo','Unidade','Status','Coletado por','Data/Hora']];
  LOJAS[ins].forEach(l=>{
    const d=leituras[ins][l.luc];
    linhas.push([ins,l.luc,l.nome,l.anterior,d?.leitura_atual??'',d?.consumo??'',UNIDADES[ins],d?.status??'pendente',d?.coletado_por??'',d?.updated_at?new Date(d.updated_at).toLocaleString('pt-BR'):'']);
  });
  const csv=linhas.map(r=>r.join(';')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='leituras_'+ins+'_'+MES_ATUAL+'.csv';a.click();
  toast('Arquivo exportado!');
}
